<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spotify Unfollowers</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="app" id="app">

    <!-- Loading -->
    <div id="state-loading" class="state">
      <div class="loader-track">
        <div class="loader-dot"></div>
        <div class="loader-dot"></div>
        <div class="loader-dot"></div>
      </div>
    </div>

    <!-- Initial -->
    <div id="state-initial" class="state hidden">
      <div class="brand">
        <div class="brand-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 12l2 2 4-4"/>
            <circle cx="12" cy="12" r="10"/>
          </svg>
        </div>
        <div class="brand-text">
          <span class="brand-name">UNFOLLOWERS</span>
          <span class="brand-tag">SPOTIFY DIAGNOSTIC</span>
        </div>
      </div>

      <div class="location-warning">
        <div class="warning-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
            <line x1="12" y1="9" x2="12" y2="13"/>
            <line x1="12" y1="17" x2="12.01" y2="17"/>
          </svg>
        </div>
        <p>Open <strong>open.spotify.com</strong> and navigate to your profile page, then click the extension again.</p>
      </div>

      <button id="btn-go-spotify" class="btn-primary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/>
          <polyline points="15 3 21 3 21 9"/>
          <line x1="10" y1="14" x2="21" y2="3"/>
        </svg>
        Open Spotify
      </button>

      <button id="btn-start-scan" class="btn-primary hidden">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        Start Scan
      </button>
    </div>

    <!-- Scanning -->
    <div id="state-scanning" class="state hidden">
      <div class="brand compact">
        <div class="brand-icon pulse">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
          </svg>
        </div>
        <span class="brand-name">SCANNING</span>
      </div>

      <div class="progress-section">
        <div class="progress-meta">
          <span class="progress-label" id="progress-label">Preparing...</span>
          <span class="progress-pct" id="progress-pct">0%</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
      </div>

      <div class="scan-stats">
        <div class="scan-stat">
          <span class="scan-stat-val" id="stat-following">0</span>
          <span class="scan-stat-lbl">following</span>
        </div>
        <div class="scan-stat">
          <span class="scan-stat-val" id="stat-followers">0</span>
          <span class="scan-stat-lbl">followers</span>
        </div>
        <div class="scan-stat">
          <span class="scan-stat-val" id="stat-unfollowers">0</span>
          <span class="scan-stat-lbl">unfollowers</span>
        </div>
      </div>

      <button id="btn-cancel-scan" class="btn-cancel">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="15" y1="9" x2="9" y2="15"/>
          <line x1="9" y1="9" x2="15" y2="15"/>
        </svg>
        Cancel Scan
      </button>
    </div>

    <!-- Results -->
    <div id="state-results" class="state hidden">
      <div class="profile-card" id="user-profile-bar" style="display: none;">
        <div class="profile-card-top">
          <img class="profile-avatar" id="user-profile-avatar" src="" alt="">
          <div class="profile-info">
            <span class="profile-name" id="user-profile-name"></span>
          </div>
        </div>
        <div class="profile-stats">
          <div class="profile-stat">
            <span class="profile-stat-val" id="res-stat-following">0</span>
            <span class="profile-stat-lbl">Following</span>
          </div>
          <div class="profile-stat">
            <span class="profile-stat-val" id="res-stat-followers">0</span>
            <span class="profile-stat-lbl">Followers</span>
          </div>
          <div class="profile-stat accent">
            <span class="profile-stat-val" id="results-count">0</span>
            <span class="profile-stat-lbl">Unfollowers</span>
          </div>
        </div>
      </div>

      <div class="results-actions">
        <button id="btn-show-unfollowers" class="btn-tab active" data-list="unfollowers" title="Following who don't follow you back">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M16 21v-2a4 4 0 00-4-4H5a4 4 0 00-4-4v2"/>
            <circle cx="8.5" cy="7" r="4"/>
            <line x1="18" y1="8" x2="23" y2="13"/>
            <line x1="23" y1="8" x2="18" y2="13"/>
          </svg>
          Not Following Back
        </button>
        <button id="btn-show-notfollow" class="btn-tab" data-list="notfollow" title="Followers you haven't followed back">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M16 21v-2a4 4 0 00-4-4H5a4 4 0 00-4-4v2"/>
            <circle cx="8.5" cy="7" r="4"/>
            <line x1="20" y1="8" x2="20" y2="14"/>
            <line x1="17" y1="11" x2="23" y2="11"/>
          </svg>
          Not Following
        </button>
        <button id="btn-scan-again" class="btn-ghost" title="Scan again">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="1 4 1 10 7 10"/>
            <path d="M3.51 15a9 9 0 102.13-9.36L1 10"/>
          </svg>
          Rescan
        </button>
      </div>

      <div class="list-wrapper">
        <div class="list-panel active" id="list-unfollowers">
          <div class="results-list" id="results-list"></div>
        </div>
        <div class="list-panel" id="list-notfollow">
          <div class="results-list" id="results-list-nf"></div>
        </div>
      </div>

      <div class="results-footer">
        <span class="footer-text">Made with <span class="footer-heart">&hearts;</span> by <a class="footer-link" href="https://github.com/adityafajrip/spotify-unfollowers-checker" target="_blank" rel="noopener">adityafajrip</a></span>
      </div>
    </div>

    <!-- Error -->
    <div id="state-error" class="state hidden">
      <div class="brand compact">
        <div class="brand-icon error">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <line x1="15" y1="9" x2="9" y2="15"/>
            <line x1="9" y1="9" x2="15" y2="15"/>
          </svg>
        </div>
        <span class="brand-name">ERROR</span>
      </div>
      <div class="error-box" id="error-message">Something went wrong.</div>
      <button id="btn-retry" class="btn-primary">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="1 4 1 10 7 10"/>
          <path d="M3.51 15a9 9 0 102.13-9.36L1 10"/>
        </svg>
        Retry
      </button>
    </div>

  </div>

  <script type="module" src="popup.ts"></script>
</body>
</html>
